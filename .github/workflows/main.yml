name: JavaFX Arkanoid CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - 'main'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t arkanoid .

      - name: Run Docker Image and Test
        run: docker run --name builder arkanoid

      - name: Copy target folder
        if: always()
        run: docker cp builder:/app/target .

      - name: Upload Build Product
        uses: actions/upload-artifact@v4
        with:
          name: java-build-files
          path: target/*.jar